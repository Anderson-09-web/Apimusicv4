services:
  # ─── Lavalink audio engine ───────────────────────────────────────────────────
  - type: web
    name: lavalink
    runtime: docker
    region: oregon
    dockerfilePath: ./lavalink/Dockerfile
    dockerContext: ./lavalink
    plan: free
    envVars:
      - key: LAVALINK_SERVER_PASSWORD
        sync: false
      - key: SERVER_PORT
        value: 2333

  # ─── Discord Music API + Documentation (single service) ─────────────────────
  - type: web
    name: discord-music-api
    runtime: docker
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000

      # Required: secret for signing API keys — generate with: openssl rand -hex 32
      - key: API_KEY_SECRET
        sync: false

      # Optional: password required to generate a new API key (default: Blocker-X-Music)
      # Change this to restrict key generation to users you share the new password with.
      - key: ADMIN_PASSWORD
        sync: false

      # Required by Lavalink WebSocket handshake — set your Discord bot's user ID
      - key: DISCORD_BOT_USER_ID
        sync: false

      # Lavalink connection (auto-populated from the lavalink service above)
      - key: LAVALINK_HOST
        fromService:
          type: web
          name: lavalink
          property: host
      - key: LAVALINK_PORT
        value: 2333
      - key: LAVALINK_PASSWORD
        sync: false
      - key: LAVALINK_SECURE
        value: "false"
