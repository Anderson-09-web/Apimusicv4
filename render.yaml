services:
  - type: web
    name: lavalink
    runtime: docker
    region: oregon
    dockerfilePath: ./lavalink/Dockerfile
    dockerContext: ./lavalink
    plan: free
    envVars:
      - key: LAVALINK_SERVER_PASSWORD
        sync: false
      - key: SERVER_PORT
        value: 2333

  - type: web
    name: discord-music-api
    runtime: docker
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: API_KEY
        sync: false
      - key: DISCORD_BOT_USER_ID
        sync: false
      - key: LAVALINK_HOST
        fromService:
          type: web
          name: lavalink
          property: host
      - key: LAVALINK_PORT
        value: 2333
      - key: LAVALINK_PASSWORD
        sync: false
      - key: LAVALINK_SECURE
        value: "false"

  - type: web
    name: music-api-docs
    runtime: static
    buildCommand: pnpm install && BASE_PATH=/ PORT=5000 pnpm --filter @workspace/music-api-docs run build
    staticPublishPath: ./artifacts/music-api-docs/dist/public
    envVars:
      - key: VITE_API_KEY
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
