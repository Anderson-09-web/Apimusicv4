kind = "web"
previewPath = "/"
title = "Music API Docs"
version = "1.0.0"
id = "artifacts/music-api-docs"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22845

[services.development]
run = "pnpm --filter @workspace/music-api-docs run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/music-api-docs", "run", "build" ]
serve = "static"
publicDir = "artifacts/music-api-docs/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22845"
BASE_PATH = "/"
